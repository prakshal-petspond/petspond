# Railway config for the NestJS API (monorepo root).
# Create two Railway services from the same repo:
#   - petspond-api-dev     (branch: develop)
#   - petspond-api-prod    (branch: main)
#
# In each service: Settings → set Root Directory to repo root (default),
# and ensure the Dockerfile path below is used.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
